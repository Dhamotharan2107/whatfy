<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Email Verified — Whatfy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#1e293b;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:48px 44px;max-width:440px;width:100%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.check-wrap{width:80px;height:80px;background:linear-gradient(135deg,rgba(37,211,102,.25),rgba(18,140,126,.2));border:2px solid rgba(37,211,102,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;position:relative}
.check-wrap::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px solid rgba(37,211,102,.15);animation:ripple 2s ease infinite}
@keyframes ripple{0%{transform:scale(1);opacity:1}100%{transform:scale(1.3);opacity:0}}
.check-icon{font-size:38px}
h1{font-size:26px;font-weight:800;color:#f1f5f9;margin-bottom:10px}
.subtitle{font-size:15px;color:#94a3b8;line-height:1.65;margin-bottom:32px}
.welcome-box{background:rgba(37,211,102,.08);border:1px solid rgba(37,211,102,.2);border-radius:12px;padding:16px 20px;margin-bottom:32px}
.welcome-box p{font-size:14px;color:#4ade80;font-weight:600}
.welcome-box span{font-size:13px;color:#64748b;display:block;margin-top:4px}
.btn-go{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 28px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 4px 20px rgba(37,211,102,.25)}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(37,211,102,.35)}
</style>
<meta http-equiv="refresh" content="5;url=/dashboard">
</head>
<body>
<div class="card">
  <div class="check-wrap">
    <span class="check-icon">✓</span>
  </div>
  <h1>Email Verified!</h1>
  <p class="subtitle">Your account is now active, <strong style="color:#f1f5f9">{{ name }}</strong>. You're all set to start using Whatfy.</p>

  <div class="welcome-box">
    <p>Welcome to Whatfy</p>
    <span>Redirecting to dashboard in 5 seconds…</span>
  </div>

  <a href="/dashboard" class="btn-go">
    Go to Dashboard →
  </a>
</div>
</body>
</html>
