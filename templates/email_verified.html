<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome to Whatfy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

.wrap{max-width:520px;width:100%}

/* Logo */
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:40px}
.logo-mark{width:40px;height:40px;background:linear-gradient(135deg,#25D366,#128C7E);border-radius:11px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(37,211,102,.35)}
.logo-mark svg{width:20px;height:20px;fill:#fff}
.logo-text{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.3px}

/* Success circle */
.success-ring{width:88px;height:88px;margin:0 auto 28px;position:relative}
.success-ring svg{width:88px;height:88px}
.ring-bg{fill:none;stroke:rgba(37,211,102,.15);stroke-width:4}
.ring-fill{fill:none;stroke:#25D366;stroke-width:4;stroke-linecap:round;stroke-dasharray:250;stroke-dashoffset:250;animation:drawRing .8s ease .2s forwards}
@keyframes drawRing{to{stroke-dashoffset:0}}
.check-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.check-icon svg{width:34px;height:34px;stroke:#25D366;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;animation:fadeIn .3s ease .9s forwards}
@keyframes fadeIn{to{opacity:1}}

/* Card */
.card{background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:44px 40px;text-align:center}
.card h1{font-size:26px;font-weight:800;color:#f1f5f9;margin-bottom:8px;letter-spacing:-.3px}
.card p{font-size:15px;color:#64748b;line-height:1.65;margin-bottom:32px}
.card p strong{color:#94a3b8}

/* Steps */
.steps{display:flex;gap:0;margin-bottom:36px;position:relative}
.steps::before{content:'';position:absolute;top:18px;left:calc(16.66% + 18px);right:calc(16.66% + 18px);height:2px;background:rgba(255,255,255,.07)}
.step{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px}
.step-circle{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;position:relative;z-index:1;flex-shrink:0}
.step-done{background:rgba(37,211,102,.15);border:2px solid rgba(37,211,102,.4);color:#4ade80}
.step-active{background:rgba(37,211,102,.2);border:2px solid #25D366;color:#4ade80;box-shadow:0 0 16px rgba(37,211,102,.3)}
.step-next{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);color:#475569}
.step-label{font-size:11.5px;font-weight:600;color:#475569;text-align:center;line-height:1.35}
.step-done+.step-label,.step-active+.step-label{color:#94a3b8}

/* CTA */
.cta{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:15px 28px;
  background:linear-gradient(135deg,#25D366,#128C7E);
  color:#fff;border:none;border-radius:12px;
  font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;
  transition:all .2s;box-shadow:0 4px 24px rgba(37,211,102,.3);
  margin-bottom:14px;
}
.cta:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(37,211,102,.4)}
.cta svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.skip{font-size:12.5px;color:#334155;text-align:center}
.skip a{color:#4ade80;text-decoration:none;font-weight:600}
.skip a:hover{text-decoration:underline}

/* Countdown */
.countdown{font-size:11.5px;color:#334155;margin-top:10px}
.countdown span{color:#475569;font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
    </div>
    <span class="logo-text">Whatfy</span>
  </div>

  <div class="card">
    <!-- Animated check -->
    <div class="success-ring">
      <svg viewBox="0 0 88 88">
        <circle class="ring-bg" cx="44" cy="44" r="39"/>
        <circle class="ring-fill" cx="44" cy="44" r="39" transform="rotate(-90 44 44)"/>
      </svg>
      <div class="check-icon">
        <svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>
      </div>
    </div>

    <h1>You're verified, {{ name }}!</h1>
    <p>Your account is active. One more step — connect your WhatsApp number to start sending messages.</p>

    <!-- Progress steps -->
    <div class="steps">
      <div class="step">
        <div class="step-circle step-done">✓</div>
        <div class="step-label">Create<br>Account</div>
      </div>
      <div class="step">
        <div class="step-circle step-done">✓</div>
        <div class="step-label">Verify<br>Email</div>
      </div>
      <div class="step">
        <div class="step-circle step-active">3</div>
        <div class="step-label">Connect<br>WhatsApp</div>
      </div>
      <div class="step">
        <div class="step-circle step-next">4</div>
        <div class="step-label">Start<br>Sending</div>
      </div>
    </div>

    <a href="/connect" class="cta">
      <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
      Connect WhatsApp Now
    </a>

    <div class="skip">Prefer to explore first? <a href="/dashboard">Go to Dashboard</a></div>
    <div class="countdown">Auto-redirecting to setup in <span id="cd">8</span>s</div>
  </div>
</div>
<script>
let n = 8;
const el = document.getElementById('cd');
const t = setInterval(() => {
  n--;
  el.textContent = n;
  if (n <= 0) { clearInterval(t); location.href = '/connect'; }
}, 1000);
</script>
</body>
</html>
